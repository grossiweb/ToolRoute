<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 220">
  <rect width="350" height="220" rx="12" fill="#f8fafc"/>
  <rect x="0" y="0" width="350" height="4" rx="2" fill="#0F6E56"/>
  <!-- Title -->
  <text x="24" y="36" fill="#111827" font-family="system-ui, sans-serif" font-size="16" font-weight="800">Auto-Escalation</text>
  <text x="24" y="54" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">Fallback chains + tier escalation on failure</text>
  <!-- Flow diagram -->
  <g transform="translate(24, 72)">
    <!-- Step 1: Route -->
    <rect x="0" y="0" width="82" height="50" rx="8" fill="#EEE9FF" stroke="#6C47D8" stroke-width="1"/>
    <text x="41" y="20" fill="#6C47D8" font-family="system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle">ROUTE</text>
    <text x="41" y="36" fill="#6b7280" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle">GPT-4o Mini</text>
    <text x="41" y="46" fill="#0F6E56" font-family="monospace" font-size="7" text-anchor="middle">$0.002</text>
    <!-- Arrow -->
    <text x="95" y="30" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">→</text>
    <!-- Step 2: Fallback -->
    <rect x="112" y="0" width="82" height="50" rx="8" fill="#f8fafc" stroke="#d1d5db" stroke-width="1"/>
    <text x="153" y="20" fill="#d97706" font-family="system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle">FALLBACK</text>
    <text x="153" y="36" fill="#6b7280" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle">Gemini Flash</text>
    <text x="153" y="46" fill="#6b7280" font-family="monospace" font-size="7" text-anchor="middle">same tier</text>
    <!-- Arrow -->
    <text x="207" y="30" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">→</text>
    <!-- Step 3: Escalate -->
    <rect x="224" y="0" width="82" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
    <text x="265" y="20" fill="#d97706" font-family="system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle">ESCALATE</text>
    <text x="265" y="36" fill="#6b7280" font-family="system-ui, sans-serif" font-size="8" text-anchor="middle">Claude Sonnet</text>
    <text x="265" y="46" fill="#d97706" font-family="monospace" font-size="7" text-anchor="middle">higher tier</text>
  </g>
  <!-- Explanation -->
  <g transform="translate(24, 142)">
    <circle cx="8" cy="8" r="4" fill="#0F6E56"/>
    <text x="18" y="12" fill="#374151" font-family="system-ui, sans-serif" font-size="10">Start cheap — only escalate if needed</text>
    <circle cx="8" cy="28" r="4" fill="#6C47D8"/>
    <text x="18" y="32" fill="#374151" font-family="system-ui, sans-serif" font-size="10">Cross-provider fallbacks within tier</text>
    <circle cx="8" cy="48" r="4" fill="#d97706"/>
    <text x="18" y="52" fill="#374151" font-family="system-ui, sans-serif" font-size="10">Automatic tier escalation on failure</text>
  </g>
</svg>
