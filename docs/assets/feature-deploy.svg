<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" rx="12" fill="url(#bg3)"/>

  <!-- Header -->
  <text x="24" y="36" fill="#22c55e" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5">DEPLOY IN SECONDS</text>
  <text x="24" y="62" fill="white" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Pick a stack.</text>
  <text x="24" y="84" fill="white" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Copy config. Ship.</text>

  <!-- Platform buttons -->
  <rect x="24" y="100" width="110" height="32" rx="8" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="79" y="120" fill="#c084fc" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Claude Desktop</text>

  <rect x="144" y="100" width="80" height="32" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="184" y="120" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Cursor</text>

  <rect x="234" y="100" width="60" height="32" rx="8" fill="#334155" stroke="#475569" stroke-width="1"/>
  <text x="264" y="120" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">JSON</text>

  <!-- Config preview -->
  <rect x="24" y="144" width="352" height="112" rx="8" fill="#020617" stroke="#334155" stroke-width="1"/>
  <text x="36" y="166" fill="#e2e8f0" font-family="monospace" font-size="11">{</text>
  <text x="48" y="182" fill="#c084fc" font-family="monospace" font-size="11">"mcpServers"</text>
  <text x="150" y="182" fill="#e2e8f0" font-family="monospace" font-size="11">: {</text>
  <text x="60" y="198" fill="#fbbf24" font-family="monospace" font-size="11">"brave-search-mcp"</text>
  <text x="200" y="198" fill="#e2e8f0" font-family="monospace" font-size="11">: { ... },</text>
  <text x="60" y="214" fill="#fbbf24" font-family="monospace" font-size="11">"firecrawl-mcp"</text>
  <text x="180" y="214" fill="#e2e8f0" font-family="monospace" font-size="11">: { ... },</text>
  <text x="60" y="230" fill="#fbbf24" font-family="monospace" font-size="11">"context7"</text>
  <text x="135" y="230" fill="#e2e8f0" font-family="monospace" font-size="11">: { ... }</text>
  <text x="48" y="246" fill="#e2e8f0" font-family="monospace" font-size="11">} }</text>

  <!-- Copy button -->
  <rect x="300" y="148" width="68" height="24" rx="6" fill="#22c55e" opacity="0.2"/>
  <text x="334" y="164" fill="#22c55e" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Copied!</text>
</svg>
