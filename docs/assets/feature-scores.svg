<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 220">
  <rect width="350" height="220" rx="12" fill="#f8fafc"/>
  <rect x="0" y="0" width="350" height="4" rx="2" fill="#0F6E56"/>
  <!-- Title -->
  <text x="24" y="36" fill="#111827" font-family="system-ui, sans-serif" font-size="16" font-weight="800">Cost Savings</text>
  <text x="24" y="54" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">60-90% cheaper than defaulting to GPT-4o</text>
  <!-- Without -->
  <g transform="translate(24, 72)">
    <rect x="0" y="0" width="140" height="120" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="12" y="20" fill="#dc2626" font-family="system-ui, sans-serif" font-size="10" font-weight="700">Without ToolRoute</text>
    <text x="12" y="42" fill="#6b7280" font-family="system-ui, sans-serif" font-size="9">Every task →</text>
    <text x="12" y="58" fill="#111827" font-family="monospace" font-size="10" font-weight="700">GPT-4o</text>
    <text x="12" y="82" fill="#6b7280" font-family="system-ui, sans-serif" font-size="9">Cost per call:</text>
    <text x="12" y="102" fill="#dc2626" font-family="monospace" font-size="18" font-weight="800">$0.0200</text>
  </g>
  <!-- With -->
  <g transform="translate(180, 72)">
    <rect x="0" y="0" width="145" height="120" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1" opacity="0.8"/>
    <text x="12" y="20" fill="#0F6E56" font-family="system-ui, sans-serif" font-size="10" font-weight="700">With ToolRoute</text>
    <text x="12" y="42" fill="#6b7280" font-family="system-ui, sans-serif" font-size="9">Right model →</text>
    <text x="12" y="58" fill="#111827" font-family="monospace" font-size="10" font-weight="700">GPT-4o Mini</text>
    <text x="12" y="82" fill="#6b7280" font-family="system-ui, sans-serif" font-size="9">Cost per call:</text>
    <text x="12" y="102" fill="#0F6E56" font-family="monospace" font-size="18" font-weight="800">$0.0020</text>
  </g>
  <!-- Arrow -->
  <text x="168" y="142" fill="#6C47D8" font-family="system-ui, sans-serif" font-size="16" font-weight="800" text-anchor="middle">→</text>
</svg>
